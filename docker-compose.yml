services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: rca-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      ALLOWED_ORIGINS: "http://localhost:3001"
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    container_name: rca-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m

networks:
  default:
    name: rca-network